# CRM 审批 — button_interaction
template: button_interaction
slots:
  title: "{{orderNo}} 待审批"
  desc: "{{amount}} 元 · {{shopName}}"
rows:
  - keyname: 申请人
    value: "{{applicant}}"
  - keyname: 单号
    value: "{{orderNo}}"
buttons:
  - key: approve
    text: 通过
    style: 1
  - key: reject
    text: 驳回
    style: 2
task_id: "crm:approve:{{orderId}}:v1"
